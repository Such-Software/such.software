<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="dt-cat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#1565c0"/>
    </linearGradient>
    <filter id="dt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="22" fill="#0d1b1f"/>
  <!-- quantum cat -->
  <g filter="url(#dt-glow)">
    <!-- ears -->
    <polygon points="34,40 44,16 56,38" fill="url(#dt-cat)"/>
    <polygon points="94,40 84,16 72,38" fill="url(#dt-cat)"/>
    <!-- head -->
    <circle cx="64" cy="62" r="30" fill="url(#dt-cat)"/>
  </g>
  <!-- eyes + nose -->
  <circle cx="53" cy="58" r="4" fill="#06222b"/>
  <circle cx="75" cy="58" r="4" fill="#06222b"/>
  <path d="M60 70 h8 l-4 5 z" fill="#06222b"/>
  <!-- whiskers -->
  <g stroke="#bdf6ff" stroke-width="1.5" opacity="0.7" stroke-linecap="round">
    <path d="M78 66 h16M78 71 h14M50 66 h-16M50 71 h-14"/>
  </g>
  <!-- decay particles drifting off (dissolving) -->
  <g fill="#7df9ff">
    <circle cx="96" cy="30" r="3" opacity="0.9"/>
    <circle cx="106" cy="22" r="2.2" opacity="0.6"/>
    <circle cx="114" cy="16" r="1.6" opacity="0.35"/>
    <circle cx="90" cy="96" r="2.6" opacity="0.7"/>
    <circle cx="100" cy="104" r="1.8" opacity="0.4"/>
  </g>
</svg>
