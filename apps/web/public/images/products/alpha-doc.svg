<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="ad-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="22" fill="#171c26"/>
  <!-- atom orbits in the four radiation colors -->
  <g fill="none" stroke-width="2.5" transform="translate(64 52)">
    <ellipse rx="40" ry="15" stroke="#ff6a00" opacity="0.85"/>
    <ellipse rx="40" ry="15" stroke="#00a8ff" opacity="0.85" transform="rotate(60)"/>
    <ellipse rx="40" ry="15" stroke="#9b30ff" opacity="0.85" transform="rotate(120)"/>
  </g>
  <!-- electrons -->
  <circle cx="104" cy="52" r="4" fill="#ff6a00"/>
  <circle cx="40" cy="24" r="4" fill="#00a8ff"/>
  <circle cx="40" cy="80" r="4" fill="#9b30ff"/>
  <circle cx="92" cy="78" r="4.5" fill="#39ff14"/>
  <!-- nucleus -->
  <circle cx="64" cy="52" r="9" fill="#eafff3" filter="url(#ad-glow)"/>
  <!-- mortarboard (graduation cap) -->
  <g transform="translate(64 100)">
    <polygon points="0,-9 30,2 0,13 -30,2" fill="#d7e0ea"/>
    <path d="M-17 6 v10 q17 9 34 0 V6" fill="#aeb9c7"/>
    <line x1="30" y1="2" x2="30" y2="16" stroke="#39ff14" stroke-width="2"/>
    <circle cx="30" cy="17" r="2.5" fill="#39ff14"/>
  </g>
</svg>
