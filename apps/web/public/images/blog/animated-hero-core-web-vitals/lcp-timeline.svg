<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" role="img"
     aria-label="Timeline comparing LCP before and after. Before: first contentful paint at 1.1s, then a roughly 4 second render-delay gap, then LCP at 5.2s. After: first contentful paint at 1.1s and LCP at 1.4s with the gap gone.">
  <rect x="2" y="2" width="756" height="336" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="100" y="38" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700" fill="#1e293b">Where the LCP time goes</text>

  <!-- Before row -->
  <text x="100" y="100" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#334155">Before: one big client component</text>
  <rect x="100" y="112" width="110" height="16" fill="#e2e8f0"/>
  <text x="155" y="124" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">load</text>
  <rect x="210" y="112" width="410" height="16" fill="#fde68a" stroke="#d97706"/>
  <text x="415" y="124" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#b45309">render delay &#8776; 4 s</text>
  <line x1="210" y1="106" x2="210" y2="134" stroke="#059669" stroke-width="2"/>
  <circle cx="210" cy="120" r="4" fill="#059669"/>
  <text x="210" y="150" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#059669">FCP 1.1 s</text>
  <line x1="620" y1="106" x2="620" y2="134" stroke="#dc2626" stroke-width="2"/>
  <circle cx="620" cy="120" r="5" fill="#dc2626"/>
  <text x="620" y="150" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626">LCP 5.2 s</text>

  <!-- After row -->
  <text x="100" y="197" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#334155">After: server HTML + small client island</text>
  <rect x="100" y="209" width="110" height="16" fill="#e2e8f0"/>
  <text x="155" y="221" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">load</text>
  <rect x="210" y="209" width="30" height="16" fill="#fde68a" stroke="#d97706"/>
  <line x1="210" y1="203" x2="210" y2="231" stroke="#059669" stroke-width="2"/>
  <circle cx="210" cy="217" r="4" fill="#059669"/>
  <circle cx="240" cy="217" r="5" fill="#059669"/>
  <text x="252" y="221" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#059669">FCP 1.1 s &#183; LCP 1.4 s</text>
  <text x="430" y="221" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">render delay: gone</text>

  <!-- time axis -->
  <line x1="100" y1="290" x2="700" y2="290" stroke="#cbd5e1" stroke-width="1"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
    <line x1="100" y1="290" x2="100" y2="296" stroke="#cbd5e1"/><text x="100" y="312">0 s</text>
    <line x1="200" y1="290" x2="200" y2="296" stroke="#cbd5e1"/><text x="200" y="312">1 s</text>
    <line x1="300" y1="290" x2="300" y2="296" stroke="#cbd5e1"/><text x="300" y="312">2 s</text>
    <line x1="400" y1="290" x2="400" y2="296" stroke="#cbd5e1"/><text x="400" y="312">3 s</text>
    <line x1="500" y1="290" x2="500" y2="296" stroke="#cbd5e1"/><text x="500" y="312">4 s</text>
    <line x1="600" y1="290" x2="600" y2="296" stroke="#cbd5e1"/><text x="600" y="312">5 s</text>
    <line x1="700" y1="290" x2="700" y2="296" stroke="#cbd5e1"/><text x="700" y="312">6 s</text>
  </g>
</svg>
