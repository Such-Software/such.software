<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img"
     aria-label="Two request timelines. Before: the HTML arrives, then the browser makes a second request for the stylesheet and waits for it, then the logo paints late. After: the HTML arrives with the CSS inlined, and the logo paints immediately.">
  <rect x="2" y="2" width="756" height="296" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="100" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700" fill="#1e293b">Why the logo painted late: a second request</text>

  <!-- Before -->
  <text x="100" y="96" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#334155">Before: separate stylesheet (render-blocking)</text>
  <rect x="100" y="108" width="150" height="22" rx="3" fill="#e2e8f0"/>
  <text x="175" y="123" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#475569">HTML (+ logo)</text>
  <rect x="250" y="108" width="330" height="22" rx="3" fill="#fde68a" stroke="#d97706"/>
  <text x="415" y="123" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#b45309">fetch + wait for CSS</text>
  <line x1="580" y1="100" x2="580" y2="138" stroke="#dc2626" stroke-width="2"/>
  <circle cx="580" cy="119" r="5" fill="#dc2626"/>
  <text x="580" y="154" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626">logo paints (late)</text>

  <!-- After -->
  <text x="100" y="208" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#334155">After: CSS inlined in the HTML</text>
  <rect x="100" y="220" width="170" height="22" rx="3" fill="#d1fae5" stroke="#059669"/>
  <text x="185" y="235" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#047857">HTML (+ logo + CSS)</text>
  <line x1="270" y1="212" x2="270" y2="250" stroke="#059669" stroke-width="2"/>
  <circle cx="270" cy="231" r="5" fill="#059669"/>
  <text x="284" y="235" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#047857">logo paints (early)</text>

  <text x="100" y="282" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#64748b">Same logo, ready instantly either way. The wait was the CSS round-trip, not the image.</text>
</svg>
